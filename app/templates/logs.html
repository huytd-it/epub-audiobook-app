{% extends "base.html" %}
{% block title %}Logs{% endblock %}
{% block content %}
<h2>Application Logs</h2>

<div class="card">
    <div class="log-toolbar">
        <span style="color:var(--text-muted);font-size:var(--font-size-sm)">
            File: <code>{{ log_path }}</code> &mdash; Last {{ max_lines }} lines
        </span>
        <button onclick="copyLogs()" class="btn-outline btn-sm">Copy all</button>
        <a href="/logs/raw?lines={{ max_lines }}" target="_blank" download="app.log" class="btn-outline btn-sm">Download</a>
        <button onclick="clearLogs()" class="btn-danger btn-sm">Clear Logs</button>
    </div>
    <pre id="log-content" class="log-content">{{ log_content }}</pre>
</div>

<script>
function clearLogs() {
    if (!confirm('Are you sure you want to clear all logs?')) return;
    fetch('/logs', { method: 'DELETE' }).then(r => r.text()).then(msg => {
        document.getElementById('log-content').textContent = msg;
    }).catch(() => alert('Failed to clear logs'));
}

function copyLogs() {
    const el = document.getElementById('log-content');
    const text = el.textContent;
    navigator.clipboard.writeText(text).then(() => {
        const btn = document.querySelector('button[onclick="copyLogs()"]');
        const orig = btn.textContent;
        btn.textContent = 'Copied!';
        setTimeout(() => btn.textContent = orig, 1500);
    }).catch(() => alert('Failed to copy'));
}
</script>
{% endblock %}
